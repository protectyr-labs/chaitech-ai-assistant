<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220" role="img" aria-label="Secure Before Push — security check before your code leaves your laptop">
  <defs>
    <pattern id="dots-sec" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.9" fill="#E8D4A8" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="800" height="220" fill="#FDF6E3"/>
  <rect width="800" height="220" fill="url(#dots-sec)"/>

  <g font-family="'Fredoka', 'Nunito', 'Segoe UI', system-ui, sans-serif">
    <text x="40" y="62" font-size="28" font-weight="700" fill="#3D3025">Check before you push</text>
    <text x="40" y="92" font-size="14" font-weight="500" fill="#6B5847" font-style="italic">Security-by-design check that runs before</text>
    <text x="40" y="112" font-size="14" font-weight="500" fill="#6B5847" font-style="italic">your code leaves your laptop. Catches OWASP</text>
    <text x="40" y="132" font-size="14" font-weight="500" fill="#6B5847" font-style="italic">Top 10 issues, secrets, and SOC 2 gaps.</text>
    <path d="M 40 142 q 40 4, 80 0 t 80 0" fill="none" stroke="#5EBBB3" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Right side: a friendly shield with a magnifying glass, surrounded by small check icons -->
  <g transform="translate(585, 108)">
    <!-- shield background -->
    <path d="M 0 -60 Q -40 -55, -50 -45 L -50 0 Q -50 40, 0 62 Q 50 40, 50 0 L 50 -45 Q 40 -55, 0 -60 Z" fill="#5EBBB3" stroke="#3D8A84" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- inner fill -->
    <path d="M 0 -50 Q -35 -46, -42 -38 L -42 -5 Q -42 33, 0 52 Q 42 33, 42 -5 L 42 -38 Q 35 -46, 0 -50 Z" fill="#7FD1C9" opacity="0.5"/>
    <!-- shield friendly face -->
    <circle cx="-10" cy="-18" r="3" fill="#3D3025"/>
    <circle cx="10" cy="-18" r="3" fill="#3D3025"/>
    <path d="M -8 -8 q 8 6, 16 0" fill="none" stroke="#3D3025" stroke-width="2" stroke-linecap="round"/>
    <!-- magnifying glass held up -->
    <g transform="translate(22, 15)">
      <circle cx="0" cy="0" r="14" fill="#FFF8ED" stroke="#3D3025" stroke-width="2.5"/>
      <path d="M 10 10 L 20 20" stroke="#3D3025" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M -6 0 L -2 4 L 6 -4" fill="none" stroke="#5EBBB3" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Orbit icons around the shield: lock, key, bug, eye -->
  <!-- lock top-left -->
  <g transform="translate(495, 55)">
    <rect x="-10" y="-4" width="20" height="16" rx="2" fill="#F5D77A" stroke="#3D3025" stroke-width="1.8"/>
    <path d="M -6 -4 L -6 -10 Q -6 -16, 0 -16 Q 6 -16, 6 -10 L 6 -4" fill="none" stroke="#3D3025" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="4" r="2" fill="#3D3025"/>
    <text x="0" y="26" font-size="9" font-weight="700" fill="#3D3025" text-anchor="middle" font-family="'Fredoka', sans-serif">secrets</text>
  </g>
  <!-- eye top-right (monitoring/logging) -->
  <g transform="translate(695, 55)">
    <path d="M -18 0 Q 0 -14, 18 0 Q 0 14, -18 0 Z" fill="#C7A3D9" stroke="#3D3025" stroke-width="1.8"/>
    <circle cx="0" cy="0" r="5" fill="#FFF8ED" stroke="#3D3025" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="2.5" fill="#3D3025"/>
    <text x="0" y="24" font-size="9" font-weight="700" fill="#3D3025" text-anchor="middle" font-family="'Fredoka', sans-serif">logging</text>
  </g>
  <!-- bug bottom-left (OWASP) -->
  <g transform="translate(495, 175)">
    <ellipse cx="0" cy="0" rx="10" ry="8" fill="#E8957F" stroke="#3D3025" stroke-width="1.8"/>
    <path d="M -10 0 L -14 -4 M -10 3 L -14 6 M 10 0 L 14 -4 M 10 3 L 14 6" stroke="#3D3025" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 0 -8 L 0 -12 M -3 -10 L 3 -10" stroke="#3D3025" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="-3" cy="-2" r="1.2" fill="#FFF8ED"/>
    <circle cx="3" cy="-2" r="1.2" fill="#FFF8ED"/>
    <text x="0" y="24" font-size="9" font-weight="700" fill="#3D3025" text-anchor="middle" font-family="'Fredoka', sans-serif">OWASP 10</text>
  </g>
  <!-- badge/compliance bottom-right (SOC 2) -->
  <g transform="translate(695, 175)">
    <path d="M 0 -10 L 10 -3 L 10 9 L 0 15 L -10 9 L -10 -3 Z" fill="#F5D77A" stroke="#3D3025" stroke-width="1.8" stroke-linejoin="round"/>
    <text x="0" y="6" font-size="9" font-weight="700" fill="#3D3025" text-anchor="middle" font-family="'Fredoka', sans-serif">SOC2</text>
    <text x="0" y="32" font-size="9" font-weight="700" fill="#3D3025" text-anchor="middle" font-family="'Fredoka', sans-serif">compliance</text>
  </g>

  <!-- dashed orbit lines -->
  <path d="M 510 75 q 30 -15, 65 -10" fill="none" stroke="#8B7360" stroke-width="1.3" stroke-linecap="round" stroke-dasharray="3,4" opacity="0.55"/>
  <path d="M 595 50 q 35 0, 70 15" fill="none" stroke="#8B7360" stroke-width="1.3" stroke-linecap="round" stroke-dasharray="3,4" opacity="0.55"/>
  <path d="M 510 165 q 30 10, 65 5" fill="none" stroke="#8B7360" stroke-width="1.3" stroke-linecap="round" stroke-dasharray="3,4" opacity="0.55"/>
  <path d="M 595 180 q 35 5, 70 -5" fill="none" stroke="#8B7360" stroke-width="1.3" stroke-linecap="round" stroke-dasharray="3,4" opacity="0.55"/>
</svg>
