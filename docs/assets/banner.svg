<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" width="1200" height="220" role="img" aria-label="ChaiTech Claude Code Commons">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0"/>
      <stop offset="40%" stop-color="#f59e0b" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="off"/>
      <feMerge><feMergeNode in="off"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="220" fill="url(#bg)"/>

  <!-- subtle horizontal accent rule under the title -->
  <rect x="60" y="112" width="520" height="1.5" fill="url(#accentLine)"/>

  <!-- Left: typography block -->
  <g font-family="Inter, 'Segoe UI', system-ui, sans-serif" fill="#e2e8f0">
    <text x="60" y="76" font-size="36" font-weight="700" letter-spacing="-0.5">ChaiTech Claude Code Commons</text>
    <text x="60" y="104" font-size="16" font-weight="500" fill="#94a3b8">A shared library of skills, agents, and templates for Claude Code.</text>
    <text x="60" y="150" font-size="13" font-weight="500" fill="#cbd5e1">Seeded by Cohort 7. Open to every cohort that follows.</text>

    <!-- status pill -->
    <g transform="translate(60, 170)">
      <rect x="0" y="0" width="82" height="22" rx="11" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
      <text x="41" y="15" font-size="11" font-weight="600" fill="#f59e0b" text-anchor="middle">SEED · v0.1</text>
    </g>
    <g transform="translate(150, 170)">
      <rect x="0" y="0" width="72" height="22" rx="11" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <text x="36" y="15" font-size="11" font-weight="500" fill="#cbd5e1" text-anchor="middle">MIT</text>
    </g>
    <g transform="translate(230, 170)">
      <rect x="0" y="0" width="170" height="22" rx="11" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <text x="85" y="15" font-size="11" font-weight="500" fill="#cbd5e1" text-anchor="middle">3 seeded · room to grow</text>
    </g>
  </g>

  <!-- Right: the garden — 3x3 grid of skill tiles -->
  <!-- filled tiles (seeded) on left column and a couple diagonals;
       dashed outlines (open slots) invite contribution -->
  <g transform="translate(780, 30)">
    <!-- Row 1 -->
    <g transform="translate(0, 0)">
      <rect width="50" height="50" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="25" y="31" font-size="10" font-weight="700" fill="#f59e0b" text-anchor="middle" font-family="Inter, sans-serif">EXEC</text>
    </g>
    <g transform="translate(60, 0)">
      <rect width="50" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
    </g>
    <g transform="translate(120, 0)">
      <rect width="50" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
    </g>
    <g transform="translate(180, 0)">
      <rect width="50" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
    </g>
    <g transform="translate(240, 0)">
      <rect width="50" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
    </g>

    <!-- Row 2 -->
    <g transform="translate(0, 60)">
      <rect width="50" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
    </g>
    <g transform="translate(60, 60)">
      <rect width="50" height="50" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="25" y="31" font-size="9" font-weight="700" fill="#f59e0b" text-anchor="middle" font-family="Inter, sans-serif">DAILY</text>
    </g>
    <g transform="translate(120, 60)">
      <rect width="50" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
    </g>
    <g transform="translate(180, 60)">
      <rect width="50" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
      <g transform="translate(25, 25)">
        <line x1="-7" y1="0" x2="7" y2="0" stroke="#475569" stroke-width="1.2"/>
        <line x1="0" y1="-7" x2="0" y2="7" stroke="#475569" stroke-width="1.2"/>
      </g>
    </g>
    <g transform="translate(240, 60)">
      <rect width="50" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
    </g>

    <!-- Row 3 -->
    <g transform="translate(0, 120)">
      <rect width="50" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
    </g>
    <g transform="translate(60, 120)">
      <rect width="50" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
    </g>
    <g transform="translate(120, 120)">
      <rect width="50" height="50" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="25" y="31" font-size="9" font-weight="700" fill="#f59e0b" text-anchor="middle" font-family="Inter, sans-serif">DASH</text>
    </g>
    <g transform="translate(180, 120)">
      <rect width="50" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
    </g>
    <g transform="translate(240, 120)">
      <rect width="50" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
    </g>
  </g>

  <!-- bottom-right caption -->
  <text x="1140" y="200" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#64748b" text-anchor="end">solid = seeded · dashed = room for you</text>
</svg>
