<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280" role="img" aria-label="ChaiTech AI Assistant — a friendly home for founders learning AI">
  <defs>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#E8D4A8" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1200" height="280" fill="#FDF6E3"/>
  <rect width="1200" height="280" fill="url(#dots)"/>

  <!-- Left: typography block -->
  <g font-family="'Fredoka', 'Nunito', 'Segoe UI', system-ui, sans-serif">
    <text x="60" y="92" font-size="44" font-weight="700" fill="#3D3025" letter-spacing="-0.5">ChaiTech AI Assistant</text>
    <text x="60" y="130" font-size="17" font-weight="500" fill="#6B5847" font-style="italic">A friendly home for ChaiTech founders</text>
    <text x="60" y="154" font-size="17" font-weight="500" fill="#6B5847" font-style="italic">learning to work with AI.</text>

    <!-- small caption with underline accent -->
    <text x="60" y="198" font-size="13" font-weight="600" fill="#8B7360">Made by Cohort 7, for everyone who comes next.</text>
    <path d="M 60 205 q 40 4, 80 0 t 80 0" fill="none" stroke="#E8957F" stroke-width="2" stroke-linecap="round"/>

    <!-- doodles near title block -->
    <!-- small star -->
    <g transform="translate(540, 78)">
      <path d="M 0 -10 L 2.5 -3 L 10 -2 L 4.5 3 L 6 11 L 0 7 L -6 11 L -4.5 3 L -10 -2 L -2.5 -3 Z" fill="#5EBBB3" opacity="0.85"/>
    </g>
    <!-- pencil near caption -->
    <g transform="translate(550, 185) rotate(-22)">
      <rect x="0" y="0" width="42" height="8" rx="1.5" fill="#F5D77A" stroke="#C9A83F" stroke-width="1"/>
      <path d="M 42 0 L 54 4 L 42 8 Z" fill="#3D3025"/>
      <path d="M 0 0 L 0 8" stroke="#C66E52" stroke-width="3"/>
    </g>
  </g>

  <!-- Right side: three floating cards showing the three paths -->

  <!-- Card 1: Learn (coral), rotated slightly left -->
  <g transform="translate(660, 38) rotate(-5)" font-family="'Fredoka', 'Nunito', 'Segoe UI', sans-serif">
    <rect width="140" height="170" rx="12" fill="#E8957F" stroke="#C66E52" stroke-width="2.5"/>
    <!-- pin -->
    <circle cx="70" cy="10" r="5" fill="#3D3025" opacity="0.6"/>
    <!-- open book illustration -->
    <g transform="translate(25, 38)">
      <path d="M 0 18 Q 45 10, 90 18 L 90 50 Q 45 42, 0 50 Z" fill="#FFF8ED" stroke="#3D3025" stroke-width="2" stroke-linejoin="round"/>
      <path d="M 45 14 L 45 46" stroke="#3D3025" stroke-width="2" stroke-linecap="round"/>
      <path d="M 10 25 q 12 -1, 24 0" fill="none" stroke="#C66E52" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 10 33 q 12 -1, 20 0" fill="none" stroke="#C66E52" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 56 25 q 12 -1, 24 0" fill="none" stroke="#C66E52" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 56 33 q 12 -1, 20 0" fill="none" stroke="#C66E52" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="70" y="130" font-size="22" font-weight="700" fill="#FFF8ED" text-anchor="middle">Learn</text>
    <text x="70" y="152" font-size="11" font-weight="500" fill="#FFF8ED" text-anchor="middle" opacity="0.9">start from zero</text>
  </g>

  <!-- Card 2: Use (yellow), rotated slightly right -->
  <g transform="translate(830, 58) rotate(4)" font-family="'Fredoka', 'Nunito', 'Segoe UI', sans-serif">
    <rect width="140" height="170" rx="12" fill="#F5D77A" stroke="#C9A83F" stroke-width="2.5"/>
    <circle cx="70" cy="10" r="5" fill="#3D3025" opacity="0.6"/>
    <!-- toolbox / gear illustration -->
    <g transform="translate(42, 35)">
      <!-- gear -->
      <g transform="translate(28, 28)">
        <circle cx="0" cy="0" r="14" fill="#FFF8ED" stroke="#5A4A1A" stroke-width="2.5"/>
        <circle cx="0" cy="0" r="5" fill="#5A4A1A"/>
        <g fill="#FFF8ED" stroke="#5A4A1A" stroke-width="2">
          <rect x="-3" y="-20" width="6" height="6" rx="1"/>
          <rect x="-3" y="14" width="6" height="6" rx="1"/>
          <rect x="-20" y="-3" width="6" height="6" rx="1"/>
          <rect x="14" y="-3" width="6" height="6" rx="1"/>
        </g>
      </g>
    </g>
    <text x="70" y="130" font-size="22" font-weight="700" fill="#5A4A1A" text-anchor="middle">Use</text>
    <text x="70" y="152" font-size="11" font-weight="500" fill="#5A4A1A" text-anchor="middle" opacity="0.85">skills that work</text>
  </g>

  <!-- Card 3: Ask and Share (mauve), rotated slightly left -->
  <g transform="translate(1000, 42) rotate(-3)" font-family="'Fredoka', 'Nunito', 'Segoe UI', sans-serif">
    <rect width="150" height="170" rx="12" fill="#C7A3D9" stroke="#8F6BA5" stroke-width="2.5"/>
    <circle cx="75" cy="10" r="5" fill="#3D3025" opacity="0.6"/>
    <!-- two chat bubbles -->
    <g transform="translate(20, 28)">
      <path d="M 0 10 Q 0 0, 12 0 L 55 0 Q 67 0, 67 10 L 67 32 Q 67 42, 55 42 L 30 42 L 20 52 L 20 42 L 12 42 Q 0 42, 0 32 Z" fill="#FFF8ED" stroke="#3D3025" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="22" cy="21" r="2.5" fill="#8F6BA5"/>
      <circle cx="34" cy="21" r="2.5" fill="#8F6BA5"/>
      <circle cx="46" cy="21" r="2.5" fill="#8F6BA5"/>
    </g>
    <g transform="translate(60, 55)">
      <path d="M 0 10 Q 0 0, 12 0 L 42 0 Q 54 0, 54 10 L 54 26 Q 54 36, 42 36 L 30 36 L 20 44 L 20 36 L 12 36 Q 0 36, 0 26 Z" fill="#E8957F" stroke="#3D3025" stroke-width="2" stroke-linejoin="round"/>
    </g>
    <text x="75" y="145" font-size="20" font-weight="700" fill="#FFF8ED" text-anchor="middle">Ask &amp; Share</text>
    <text x="75" y="162" font-size="10.5" font-weight="500" fill="#FFF8ED" text-anchor="middle" opacity="0.9">no silly questions</text>
  </g>

  <!-- bottom doodles: small warm decorations -->
  <!-- coffee mug -->
  <g transform="translate(75, 235)">
    <path d="M 0 5 l 2 18 q 1 4 5 4 l 14 0 q 4 0 5 -4 l 2 -18 Z" fill="#5EBBB3" stroke="#3D3025" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M 28 12 q 7 0 7 5.5 q 0 5.5 -7 5.5" fill="none" stroke="#3D3025" stroke-width="1.8"/>
    <path d="M 8 0 q -1 -4 1 -6" fill="none" stroke="#8B7360" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M 14 0 q -1 -4 1 -6" fill="none" stroke="#8B7360" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M 20 0 q -1 -4 1 -6" fill="none" stroke="#8B7360" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- heart -->
  <g transform="translate(155, 238)">
    <path d="M 10 16 C 3 10, -4 3, 4 -1 C 8 -3, 10 0, 10 3 C 10 0, 12 -3, 16 -1 C 24 3, 17 10, 10 16 Z" fill="#E8957F" stroke="#C66E52" stroke-width="1.2"/>
  </g>

  <!-- squiggle -->
  <path d="M 210 248 q 8 -8, 16 0 t 16 0 t 16 0" fill="none" stroke="#C7A3D9" stroke-width="2.5" stroke-linecap="round"/>

  <!-- small asterisk/sparkle right side bottom -->
  <g transform="translate(620, 240)">
    <path d="M 0 -7 L 0 7 M -7 0 L 7 0 M -5 -5 L 5 5 M -5 5 L 5 -5" stroke="#F5D77A" stroke-width="1.8" stroke-linecap="round"/>
  </g>
</svg>
