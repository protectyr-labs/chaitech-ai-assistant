<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220" role="img" aria-label="Daily Rhythm — morning, done, evening">
  <defs>
    <pattern id="dots-daily" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.9" fill="#E8D4A8" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="800" height="220" fill="#FDF6E3"/>
  <rect width="800" height="220" fill="url(#dots-daily)"/>

  <g font-family="'Fredoka', 'Nunito', 'Segoe UI', system-ui, sans-serif">
    <text x="40" y="62" font-size="28" font-weight="700" fill="#3D3025">Your day, bracketed</text>
    <text x="40" y="92" font-size="14" font-weight="500" fill="#6B5847" font-style="italic">Three little commands that shape your workday.</text>
    <text x="40" y="112" font-size="14" font-weight="500" fill="#6B5847" font-style="italic">Morning coffee, check-ins along the way,</text>
    <text x="40" y="132" font-size="14" font-weight="500" fill="#6B5847" font-style="italic">and a gentle close at sundown.</text>
    <path d="M 40 142 q 40 4, 80 0 t 80 0" fill="none" stroke="#5EBBB3" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Right side: 3 illustrations — morning sun, checkmark, moon -->

  <!-- Morning: sun + coffee cup, label -->
  <g transform="translate(455, 100)">
    <!-- sun -->
    <circle cx="0" cy="0" r="22" fill="#F5D77A" stroke="#C9A83F" stroke-width="2"/>
    <g stroke="#C9A83F" stroke-width="2.5" stroke-linecap="round">
      <line x1="0" y1="-32" x2="0" y2="-40"/>
      <line x1="22" y1="-22" x2="28" y2="-28"/>
      <line x1="32" y1="0" x2="40" y2="0"/>
      <line x1="22" y1="22" x2="28" y2="28"/>
      <line x1="-22" y1="22" x2="-28" y2="28"/>
      <line x1="-32" y1="0" x2="-40" y2="0"/>
      <line x1="-22" y1="-22" x2="-28" y2="-28"/>
    </g>
    <circle cx="-5" cy="-3" r="1.8" fill="#3D3025"/>
    <circle cx="5" cy="-3" r="1.8" fill="#3D3025"/>
    <path d="M -5 5 q 5 4, 10 0" fill="none" stroke="#3D3025" stroke-width="1.6" stroke-linecap="round"/>
    <text x="0" y="62" font-size="13" font-weight="700" fill="#3D3025" text-anchor="middle" font-family="'Fredoka', sans-serif">/daily-start</text>
    <text x="0" y="78" font-size="10" font-weight="500" fill="#6B5847" text-anchor="middle" font-family="'Fredoka', sans-serif">morning</text>
  </g>

  <!-- Midday: checkmark in circle -->
  <g transform="translate(595, 100)">
    <circle cx="0" cy="0" r="28" fill="#5EBBB3" stroke="#3D8A84" stroke-width="2"/>
    <path d="M -10 0 L -3 8 L 12 -9" fill="none" stroke="#FFF8ED" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="62" font-size="13" font-weight="700" fill="#3D3025" text-anchor="middle" font-family="'Fredoka', sans-serif">/done</text>
    <text x="0" y="78" font-size="10" font-weight="500" fill="#6B5847" text-anchor="middle" font-family="'Fredoka', sans-serif">whenever you ship</text>
  </g>

  <!-- Evening: moon + star -->
  <g transform="translate(735, 100)">
    <path d="M 0 -22 Q -20 -18, -20 0 Q -20 22, 5 22 Q -10 14, -10 0 Q -10 -14, 5 -22 Q 2 -22, 0 -22 Z" fill="#C7A3D9" stroke="#8F6BA5" stroke-width="2" stroke-linejoin="round"/>
    <!-- little star next to moon -->
    <g transform="translate(-28, -20)">
      <path d="M 0 -5 L 1.2 -1.5 L 5 -1 L 2.2 1.5 L 3 5 L 0 3.5 L -3 5 L -2.2 1.5 L -5 -1 L -1.2 -1.5 Z" fill="#F5D77A"/>
    </g>
    <text x="0" y="62" font-size="13" font-weight="700" fill="#3D3025" text-anchor="middle" font-family="'Fredoka', sans-serif">/daily-end</text>
    <text x="0" y="78" font-size="10" font-weight="500" fill="#6B5847" text-anchor="middle" font-family="'Fredoka', sans-serif">evening</text>
  </g>

  <!-- Connecting arc between the 3 icons -->
  <path d="M 455 80 Q 525 55, 595 72 T 735 78" fill="none" stroke="#E8957F" stroke-width="2" stroke-linecap="round" stroke-dasharray="4,5"/>
</svg>
