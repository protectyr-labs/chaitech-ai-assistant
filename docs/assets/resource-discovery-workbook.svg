<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220" role="img" aria-label="Discovery Interview Workbook — listen, learn, validate">
  <defs>
    <pattern id="dots-disc" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.9" fill="#E8D4A8" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="800" height="220" fill="#FDF6E3"/>
  <rect width="800" height="220" fill="url(#dots-disc)"/>

  <g font-family="'Fredoka', 'Nunito', 'Segoe UI', system-ui, sans-serif">
    <text x="40" y="62" font-size="28" font-weight="700" fill="#3D3025">A workbook for listening</text>
    <text x="40" y="92" font-size="14" font-weight="500" fill="#6B5847" font-style="italic">A printable companion for the 40-interview</text>
    <text x="40" y="112" font-size="14" font-weight="500" fill="#6B5847" font-style="italic">customer discovery challenge. Verbatim script,</text>
    <text x="40" y="132" font-size="14" font-weight="500" fill="#6B5847" font-style="italic">branching scenarios, pre-call briefings.</text>
    <path d="M 40 142 q 40 4, 80 0 t 80 0" fill="none" stroke="#5EBBB3" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Right side: a desk scene with notebook + tea + clock + ear (listening) -->
  <g transform="translate(490, 30)">
    <!-- desk surface line -->
    <path d="M 0 165 L 280 165" stroke="#8B7360" stroke-width="2" stroke-linecap="round"/>

    <!-- Open notebook -->
    <g transform="translate(20, 80)">
      <!-- left page -->
      <path d="M 0 0 Q 0 -8, 8 -8 L 75 -8 L 75 75 L 8 75 Q 0 75, 0 67 Z" fill="#FFF8ED" stroke="#3D3025" stroke-width="1.8" stroke-linejoin="round"/>
      <!-- right page (slight tilt) -->
      <path d="M 75 -8 L 145 -8 Q 153 -8, 153 0 L 153 67 Q 153 75, 145 75 L 75 75 Z" fill="#FFF8ED" stroke="#3D3025" stroke-width="1.8" stroke-linejoin="round"/>
      <!-- spine -->
      <line x1="75" y1="-8" x2="75" y2="75" stroke="#3D3025" stroke-width="1.5"/>
      <!-- 4 questions sketched on left page -->
      <text x="10" y="6" font-size="6.5" font-weight="700" fill="#C66E52" font-family="'Fredoka', sans-serif">4 KEY QUESTIONS</text>
      <line x1="10" y1="9" x2="65" y2="9" stroke="#C66E52" stroke-width="0.6"/>
      <text x="10" y="20" font-size="5.5" fill="#3D3025" font-family="'Fredoka', sans-serif">1. Walk me through</text>
      <text x="10" y="28" font-size="5.5" fill="#3D3025" font-family="'Fredoka', sans-serif">   the last time...</text>
      <text x="10" y="38" font-size="5.5" fill="#3D3025" font-family="'Fredoka', sans-serif">2. What did you do?</text>
      <text x="10" y="46" font-size="5.5" fill="#3D3025" font-family="'Fredoka', sans-serif">   What happened?</text>
      <text x="10" y="56" font-size="5.5" fill="#3D3025" font-family="'Fredoka', sans-serif">3. Who else cares?</text>
      <text x="10" y="66" font-size="5.5" fill="#3D3025" font-family="'Fredoka', sans-serif">4. If gone tomorrow?</text>
      <!-- right page: tally/note marks -->
      <text x="85" y="6" font-size="6.5" font-weight="700" fill="#5EBBB3" font-family="'Fredoka', sans-serif">NOTES</text>
      <line x1="85" y1="9" x2="140" y2="9" stroke="#5EBBB3" stroke-width="0.6"/>
      <line x1="85" y1="18" x2="140" y2="18" stroke="#cfdcdc" stroke-width="0.5"/>
      <line x1="85" y1="26" x2="140" y2="26" stroke="#cfdcdc" stroke-width="0.5"/>
      <line x1="85" y1="34" x2="140" y2="34" stroke="#cfdcdc" stroke-width="0.5"/>
      <line x1="85" y1="42" x2="140" y2="42" stroke="#cfdcdc" stroke-width="0.5"/>
      <line x1="85" y1="50" x2="140" y2="50" stroke="#cfdcdc" stroke-width="0.5"/>
      <line x1="85" y1="58" x2="140" y2="58" stroke="#cfdcdc" stroke-width="0.5"/>
      <line x1="85" y1="66" x2="140" y2="66" stroke="#cfdcdc" stroke-width="0.5"/>
      <!-- one squiggle "real note" -->
      <path d="M 88 22 q 8 -3, 16 0 t 16 0" fill="none" stroke="#3D3025" stroke-width="0.8"/>
      <path d="M 88 30 q 6 -3, 12 0 t 12 0" fill="none" stroke="#3D3025" stroke-width="0.8"/>
    </g>

    <!-- Pencil leaning on the notebook -->
    <g transform="translate(45, 158) rotate(-18)">
      <rect x="0" y="0" width="50" height="6" rx="1" fill="#F5D77A" stroke="#C9A83F" stroke-width="0.8"/>
      <path d="M 50 0 L 60 3 L 50 6 Z" fill="#3D3025"/>
      <path d="M 0 0 L 0 6" stroke="#C66E52" stroke-width="2"/>
    </g>

    <!-- Teacup with steam -->
    <g transform="translate(195, 110)">
      <path d="M 0 5 l 2 22 q 1 5 5 5 l 16 0 q 4 0 5 -5 l 2 -22 Z" fill="#5EBBB3" stroke="#3D3025" stroke-width="1.8" stroke-linejoin="round"/>
      <path d="M 30 12 q 8 0 8 7 q 0 7 -8 7" fill="none" stroke="#3D3025" stroke-width="1.8"/>
      <path d="M 8 0 q -1 -5 1 -8" fill="none" stroke="#8B7360" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M 16 0 q -1 -5 1 -8" fill="none" stroke="#8B7360" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M 24 0 q -1 -5 1 -8" fill="none" stroke="#8B7360" stroke-width="1.4" stroke-linecap="round"/>
    </g>

    <!-- Clock showing 25 min -->
    <g transform="translate(245, 50)">
      <circle cx="0" cy="0" r="22" fill="#FFF8ED" stroke="#3D3025" stroke-width="1.8"/>
      <!-- 12 marker -->
      <line x1="0" y1="-18" x2="0" y2="-15" stroke="#3D3025" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="18" y1="0" x2="15" y2="0" stroke="#3D3025" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="0" y1="18" x2="0" y2="15" stroke="#3D3025" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-18" y1="0" x2="-15" y2="0" stroke="#3D3025" stroke-width="1.5" stroke-linecap="round"/>
      <!-- hands: 5 past = minute hand at 1, hour hand at 12-ish -->
      <line x1="0" y1="0" x2="0" y2="-13" stroke="#3D3025" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="9" y2="-5" stroke="#C66E52" stroke-width="2" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="2" fill="#3D3025"/>
      <text x="0" y="38" font-size="9" font-weight="700" fill="#3D3025" text-anchor="middle" font-family="'Fredoka', sans-serif">25 min</text>
    </g>

    <!-- Speech bubble (listening) -->
    <g transform="translate(190, 30)">
      <path d="M 0 10 Q 0 0, 12 0 L 38 0 Q 50 0, 50 10 L 50 22 Q 50 32, 38 32 L 22 32 L 14 40 L 14 32 L 12 32 Q 0 32, 0 22 Z" fill="#C7A3D9" stroke="#3D3025" stroke-width="1.8" stroke-linejoin="round"/>
      <circle cx="15" cy="16" r="2" fill="#FFF8ED"/>
      <circle cx="25" cy="16" r="2" fill="#FFF8ED"/>
      <circle cx="35" cy="16" r="2" fill="#FFF8ED"/>
    </g>
  </g>

  <!-- bottom-right small rule about talk percent -->
  <text x="780" y="200" font-family="'Fredoka', sans-serif" font-size="10" font-weight="600" fill="#5EBBB3" text-anchor="end">talk &lt; 15% · listen the rest</text>
</svg>
