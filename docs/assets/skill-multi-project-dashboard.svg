<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220" role="img" aria-label="Multi-Project Dashboard — all your projects, one view">
  <defs>
    <pattern id="dots-dash" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.9" fill="#E8D4A8" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="800" height="220" fill="#FDF6E3"/>
  <rect width="800" height="220" fill="url(#dots-dash)"/>

  <g font-family="'Fredoka', 'Nunito', 'Segoe UI', system-ui, sans-serif">
    <text x="40" y="62" font-size="28" font-weight="700" fill="#3D3025">All your projects, one view</text>
    <text x="40" y="92" font-size="14" font-weight="500" fill="#6B5847" font-style="italic">If you juggle multiple businesses or projects,</text>
    <text x="40" y="112" font-size="14" font-weight="500" fill="#6B5847" font-style="italic">this turns them into one friendly dashboard</text>
    <text x="40" y="132" font-size="14" font-weight="500" fill="#6B5847" font-style="italic">you open with your morning coffee.</text>
    <path d="M 40 142 q 40 4, 80 0 t 80 0" fill="none" stroke="#C7A3D9" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Right side: a rounded "window frame" with 4 small project tiles inside -->
  <g transform="translate(480, 30)">
    <!-- outer frame -->
    <rect x="0" y="0" width="290" height="160" rx="12" fill="#FFF8ED" stroke="#3D3025" stroke-width="2.5"/>
    <!-- title bar -->
    <rect x="0" y="0" width="290" height="22" rx="12" fill="#5EBBB3"/>
    <rect x="0" y="10" width="290" height="12" fill="#5EBBB3"/>
    <!-- window buttons (circles) -->
    <circle cx="12" cy="11" r="3.5" fill="#E8957F"/>
    <circle cx="24" cy="11" r="3.5" fill="#F5D77A"/>
    <circle cx="36" cy="11" r="3.5" fill="#C7A3D9"/>
    <text x="145" y="15" font-size="10" font-weight="700" fill="#FFF8ED" text-anchor="middle" font-family="'Fredoka', sans-serif">My Projects</text>

    <!-- 4 project tiles -->
    <!-- tile 1 -->
    <g transform="translate(15, 35)">
      <rect width="120" height="54" rx="8" fill="#FDF6E3" stroke="#E8957F" stroke-width="1.8"/>
      <circle cx="12" cy="12" r="4" fill="#5EBBB3"/>
      <text x="22" y="16" font-size="9" font-weight="700" fill="#3D3025" font-family="'Fredoka', sans-serif">Project One</text>
      <text x="12" y="32" font-size="8" font-weight="500" fill="#6B5847" font-family="'Fredoka', sans-serif">Phase: launch</text>
      <text x="12" y="44" font-size="7.5" font-weight="400" fill="#8B7360" font-family="'Fredoka', sans-serif">updated 2 hours ago</text>
    </g>
    <!-- tile 2 -->
    <g transform="translate(155, 35)">
      <rect width="120" height="54" rx="8" fill="#FDF6E3" stroke="#F5D77A" stroke-width="1.8"/>
      <circle cx="12" cy="12" r="4" fill="#5EBBB3"/>
      <text x="22" y="16" font-size="9" font-weight="700" fill="#3D3025" font-family="'Fredoka', sans-serif">Project Two</text>
      <text x="12" y="32" font-size="8" font-weight="500" fill="#6B5847" font-family="'Fredoka', sans-serif">Phase: build</text>
      <text x="12" y="44" font-size="7.5" font-weight="400" fill="#8B7360" font-family="'Fredoka', sans-serif">updated 5 hours ago</text>
    </g>
    <!-- tile 3 -->
    <g transform="translate(15, 95)">
      <rect width="120" height="54" rx="8" fill="#FDF6E3" stroke="#C7A3D9" stroke-width="1.8"/>
      <circle cx="12" cy="12" r="4" fill="#F5D77A"/>
      <text x="22" y="16" font-size="9" font-weight="700" fill="#3D3025" font-family="'Fredoka', sans-serif">Project Three</text>
      <text x="12" y="32" font-size="8" font-weight="500" fill="#6B5847" font-family="'Fredoka', sans-serif">Phase: research</text>
      <text x="12" y="44" font-size="7.5" font-weight="400" fill="#8B7360" font-family="'Fredoka', sans-serif">updated yesterday</text>
    </g>
    <!-- tile 4 -->
    <g transform="translate(155, 95)">
      <rect width="120" height="54" rx="8" fill="#FDF6E3" stroke="#5EBBB3" stroke-width="1.8"/>
      <circle cx="12" cy="12" r="4" fill="#E8957F"/>
      <text x="22" y="16" font-size="9" font-weight="700" fill="#3D3025" font-family="'Fredoka', sans-serif">Project Four</text>
      <text x="12" y="32" font-size="8" font-weight="500" fill="#6B5847" font-family="'Fredoka', sans-serif">Phase: ideas</text>
      <text x="12" y="44" font-size="7.5" font-weight="400" fill="#8B7360" font-family="'Fredoka', sans-serif">updated 3 days ago</text>
    </g>
  </g>

  <!-- decorative: small arrow from heading to window -->
  <path d="M 420 130 q 30 10, 60 -5" fill="none" stroke="#8B7360" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3,4"/>
</svg>
